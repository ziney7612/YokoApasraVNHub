<!DOCTYPE html>

    <title>Yoko @ EVEANDBOY | VNHub</title>

    <link rel="stylesheet" href="../css/style.css">

    <style>
        .event-header{
            padding:40px 0;
        }

        .event-title{
            font-size:28px;
            margin-bottom:8px;
        }

        .event-meta{
            opacity:.6;
            margin-bottom:20px;
        }

        /* GALLERY GRID */
        .gallery{
            columns:3;
            column-gap:16px;
        }

        .gallery img{
            width:100%;
            margin-bottom:16px;
            border-radius:14px;
            cursor:pointer;
            transition:.3s;
        }

        .gallery img:hover{
            transform:scale(1.02);
        }

        /* LIGHTBOX */
        .lightbox{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,.85);
            display:none;
            justify-content:center;
            align-items:center;
            z-index:9999;
        }

        .lightbox img{
            max-width:90%;
            max-height:90%;
            border-radius:12px;
        }

        .lightbox.active{
            display:flex;
        }
    </style>
</head>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
    <img id="lightbox-img">
</div>

<script>
const images = document.querySelectorAll('.gallery img');
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightbox-img');

images.forEach(img => {
    img.addEventListener('click', () => {
        lightbox.classList.add('active');
        lightboxImg.src = img.src;
    });
});

lightbox.addEventListener('click', () => {
    lightbox.classList.remove('active');
});
</script>
