        rel="stylesheet">

    <link
        rel="stylesheet"

</head>

<body>

    <div class="container header-container">

        <a
            href="../index.html"
            class="logo">

            <img
                src="../assets/logo/logo.png"
                alt="Yoko Apasra VNHub">

            <div class="logo-text">

                <span class="logo-title">
                    Yoko Apasra VNHub
                </span>

            </div>

        </a>


        <nav>

            <ul class="nav-menu">

                <li>
                    <a href="../index.html">
                        Home
                    </a>
                </li>

                <li>
                    <a
                        href="./"
                        class="active"
                        aria-current="page">

                        Events

                    </a>
                </li>

                <li>
                    <a href="../exclusive/">
                        Exclusive
                    </a>
                </li>

                <li>
                    <a href="../about/">
                        About
                    </a>
                </li>

            </ul>

        </nav>

    </div>

</header>


<main class="gallery-page">

    <div class="container">

        <!-- BACK -->

        <a
            href="index.html"
            class="back-link">

            ← Back to Events

        </a>


        <!-- HEADER -->

        <div class="gallery-header">

            <h1
                id="event-title">

            </h1>


            <div
                id="event-meta"
                class="gallery-meta">

            </div>

        </div>


        <!-- DIVIDER -->

        <div class="section-divider">

            <span></span>

            <h2>

                Gallery

            </h2>

            <span></span>

        </div>


        <!-- GALLERY -->

        <div
            id="gallery"
            class="gallery"
            aria-live="polite">

        </div>

    </div>

</main>


<!-- ======================================================
     LIGHTBOX (Cấu trúc mới: Gom toàn bộ cụm điều khiển dạt xuống đáy)
====================================================== -->
<div id="lightbox" class="lightbox">

    <!-- Thanh đếm số góc trên bên trái giữ vị trí biệt lập sạch sẽ -->
    <div id="lightbox-counter" class="lightbox-counter"></div>

    <!-- Hai nút mũi tên điều hướng ảnh trái/phải -->
    <button type="button" class="lightbox-prev" aria-label="Previous image">❮</button>

    <div class="lightbox-stage">
        <div class="lightbox-image-container">
            <img id="lightbox-image" alt="" draggable="false">
        </div>
    </div>

    <button type="button" class="lightbox-next" aria-label="Next image">❯</button>

    <!-- 🌟 DOCK ĐIỀU KHIỂN MỜ KÍNH ĐÁY MÀN HÌNH CHUẨN PHÁC HỌA CỦA BẠN -->
    <div class="lightbox-bottom-bar">
        
        <!-- Hàng 1: Dòng tiêu đề chữ nằm gọn gàng bên trong thanh dock -->
        <p id="lightbox-caption" class="lightbox-caption"></p>
        
        <!-- Hàng 2: Cặp nút bấm gom chung nằm song song, thẳng hàng tuyệt đối -->
        <div class="lightbox-buttons-group">
            
            <!-- Nút Download Gradient kẹo ngọt chứa icon mặt trăng đuôi chữ -->
            <a id="lightbox-download" class="btn-download lightbox-download" href="" target="_blank" rel="noopener noreferrer">
                <span>Download Original</span>
                <div class="moon">☾</div>
            </a>

            <!-- Nút đóng dấu X đồng bộ thon gọn nằm ngay bên cạnh -->
            <button type="button" class="lightbox-close" aria-label="Close">&times;</button>
            
        </div>
    </div>

</div>

<footer class="site-credit">
    © 2026 Yoko Apasra VNHub.
    Made with 🤍 by Vietnamese Fans •
    Unofficial fan-made archive •
    Non-commercial project.
</footer>

<!-- Hệ thống tệp tin JavaScript thực thi -->
<script src="../js/event.js"></script>
<script src="../js/lightbox.js"></script>

</body>

</html>
