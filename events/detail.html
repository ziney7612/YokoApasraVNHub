<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

        Event Detail • Yoko Apasra VNHub

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="../css/style.css">

</head>

<body>

<header class="header">

    <div class="container header-container">

        <a
            href="../index.html"
            class="logo">

            <img
                src="../assets/logo/logo.png"
                alt="Yoko Apasra VNHub">

            <div class="logo-text">

                <span class="logo-title">
                    Yoko Apasra VNHub
                </span>

            </div>

        </a>


        <nav>

            <ul class="nav-menu">

                <li>
                    <a href="../index.html">
                        Home
                    </a>
                </li>

                <li>
                    <a
                        href="./"
                        class="active"
                        aria-current="page">

                        Events

                    </a>
                </li>

                <li>
                    <a href="../exclusive/">
                        Exclusive
                    </a>
                </li>

                <li>
                    <a href="../about/">
                        About
                    </a>
                </li>

            </ul>

        </nav>

    </div>

</header>


<main class="gallery-page">

    <div class="container">

        <!-- BACK -->

        <a
            href="index.html"
            class="back-link">

            ← Back to Events

        </a>


        <!-- HEADER -->

        <div class="gallery-header">

            <h1
                id="event-title">

            </h1>


            <div
                id="event-meta"
                class="gallery-meta">

            </div>

        </div>


        <!-- DIVIDER -->

        <div class="section-divider">

            <span></span>

            <h2>

                Gallery

            </h2>

            <span></span>

        </div>


        <!-- GALLERY -->

        <div
            id="gallery"
            class="gallery"
            aria-live="polite">

        </div>

    </div>

</main>


<!-- ======================================================
     LIGHTBOX PHIÊN BẢN PREMIUM (Tích hợp dải ảnh & Khôi phục hiệu ứng nút bấm)
====================================================== -->
<div id="lightbox" class="lightbox">

    <!-- TOP CONTROL BAR (Góc trên màn hình) -->
    <div class="lightbox-top-bar">
        <!-- 1. Thanh tiến trình góc trái -->
        <div id="lightbox-counter" class="lightbox-counter"></div>

        <!-- 2. Cụm nút hành động góc phải -->
        <div class="lightbox-action-buttons">
            
            <!-- KHÔI PHỤC: Thẻ chứa vòng tròn mặt trăng và bong bóng bay gốc -->
            <a id="lightbox-download" class="btn-download lightbox-download" href="" target="_blank" rel="noopener noreferrer">
                <span>Download Original</span>
                <div class="moon">☾</div>
            </a>
            <button type="button" class="lightbox-close" aria-label="Close">&times;</button>
        </div>
    </div>

    <!-- MAIN STAGE (Khu vực ảnh trung tâm) -->
    <div class="lightbox-stage">
        <button type="button" class="lightbox-prev" aria-label="Previous image">❮</button>

        <div class="lightbox-image-container">
            <img id="lightbox-image" alt="" draggable="false">
            <button type="button" class="lightbox-zoom-btn" aria-label="Zoom image">⛶</button>
        </div>

        <button type="button" class="lightbox-next" aria-label="Next image">❯</button>
    </div>

    <!-- BOTTOM INFO & THUMBNAILS (Khu vực đáy màn hình) -->
    <div class="lightbox-bottom-wrapper">
        <p id="lightbox-caption" class="lightbox-caption"></p>
        
        <!-- Thanh Thumbnail Strip lướt ảnh nhỏ -->
        <div class="lightbox-thumbnails-container">
            <button type="button" class="thumb-nav thumb-prev">❮</button>
            <div id="lightbox-thumbs-list" class="lightbox-thumbs-list"></div>
            <button type="button" class="thumb-nav thumb-next">❯</button>
        </div>
    </div>

</div>
    
<footer class="site-credit">
    © 2026 Yoko Apasra VNHub.
    Made with 🤍 by Vietnamese Fans •
    Unofficial fan-made archive •
    Non-commercial project.
</footer>

<!-- Hệ thống tệp tin JavaScript thực thi -->
<script src="../js/event.js"></script>
<script src="../js/lightbox.js"></script>

</body>

</html>
