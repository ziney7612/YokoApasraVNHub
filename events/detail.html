<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        Event Detail • Yoko Apasra VNHub
    </title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="../css/style.css">

</head>

<body>

<header class="header">

    <div class="container header-container">

        <a
            href="../index.html"
            class="logo">

            <img
                src="../assets/logo/logo.png"
                alt="Yoko Apasra VNHub">

            <div class="logo-text">

                <span class="logo-title">
                    Yoko Apasra VNHub
                </span>

            </div>

        </a>


        <nav>

            <ul class="nav-menu">

                <li>
                    <a href="../index.html">
                        Home
                    </a>
                </li>

                <li>
                    <a
                        href="./"
                        class="active"
                        aria-current="page">

                        Events

                    </a>
                </li>

                <li>
                    <a href="../exclusive/">
                        Exclusive
                    </a>
                </li>

                <li>
                    <a href="../about/">
                        About
                    </a>
                </li>

            </ul>

        </nav>

    </div>

</header>


<main class="gallery-page">

    <div class="container">

        <!-- BACK -->

        <a
            href="index.html"
            class="back-link">

            ← Back to Events

        </a>


        <!-- HEADER -->

        <div class="gallery-header">

            <h1
                id="event-title">

            </h1>


            <div
                id="event-meta"
                class="gallery-meta">

            </div>

        </div>


        <!-- DIVIDER -->

        <div class="section-divider">

            <span></span>

            <h2>

                Gallery

            </h2>

            <span></span>

        </div>


        <!-- GALLERY -->

        <div
            id="gallery"
            class="gallery"
            aria-live="polite">

        </div>

    </div>

</main>


<!-- ==========================================
     LIGHTBOX
========================================== -->

<div
    id="lightbox"
    class="lightbox">

    <button
        type="button"
        class="lightbox-close"
        aria-label="Close">

        &times;

    </button>


    <div
        id="lightbox-counter"
        class="lightbox-counter">

    </div>


    <button
        type="button"
        class="lightbox-prev"
        aria-label="Previous image">

        ❮

    </button>


    <div class="lightbox-stage">

        <!-- ĐÃ SỬA: Thêm lớp container bọc ngoài thẻ img để khóa vệt sáng shimmer không cho tràn ra ngoài -->
        <div class="lightbox-image-container">
            <img
                id="lightbox-image"
                alt=""
                draggable="false">
        </div>

    </div>


    <button
        type="button"
        class="lightbox-next"
        aria-label="Next image">

        ❯

    </button>


   <a
    id="lightbox-download"
    class="btn-download lightbox-download"
    href=""
    target="_blank"
    rel="noopener noreferrer">

    <span class="moon">
        ☾
    </span>

    <span>
        Download Original
    </span>

    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>
    <span class="bubble"></span>

</a>

    <p
        id="lightbox-caption"
        class="lightbox-caption">

    </p>

</div>


<footer class="site-credit">

    © 2026 Yoko Apasra VNHub.
    Made with 🤍 by Vietnamese Fans •
    Unofficial fan-made archive •
    Non-commercial project.

</footer>


<script src="../js/event.js"></script>

<script src="../js/lightbox.js"></script>

</body>

</html>
